specVersion: 1.1.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MarketFactory
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: MarketFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Market
      abis:
        - name: MarketFactory
          file: ../out/MarketFactory.sol/MarketFactory.json
        - name: PredictionMarket
          file: ../out/PredictionMarket.sol/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed address,indexed address,string,uint256,address,bool)
          handler: handleMarketCreated
      file: ./src/factory.ts
templates:
  - kind: ethereum
    name: PredictionMarket
    network: arbitrum-sepolia
    source:
      abi: PredictionMarket
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - LiquidityPosition
        - Resolution
      abis:
        - name: PredictionMarket
          file: ../out/PredictionMarket.sol/PredictionMarket.json
      eventHandlers:
        - event: SharesPurchased(indexed address,indexed uint256,uint256,uint256)
          handler: handleSharesPurchased
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swap(indexed address,indexed uint256,uint256,indexed uint256,uint256)
          handler: handleSwap
        - event: MarketResolved(bool,uint256)
          handler: handleMarketResolved
        - event: MarketFinalized(bool,uint256)
          handler: handleMarketFinalized
      file: ./src/market.ts
